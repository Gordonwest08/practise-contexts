name: Terraform PR validation

on:
    pull_request: 
        

jobs:
  plan:
    # 👇 Ensure this job runs only on pull request events
    # github.event_name tells us what triggered the workflow
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
            terraform_version: "1.7.0" # Specify your required version

      - name: terraform init
        run: terraform init

      #- name: Terraform plan
